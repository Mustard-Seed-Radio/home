<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mustard Seed Radio</title>
  <style>
    /* Reset some basic styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #111111);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #ff6f61;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }

    p {
      font-size: 1.2rem;
      margin: 1rem 0 2rem 0;
      color: #ccc;
    }

    audio {
      width: 100%;
      max-width: 400px;
      outline: none;
      margin-bottom: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,111,97,0.5);
    }

    .social-links {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .social-links a {
      text-decoration: none;
      color: #ff6f61;
      font-weight: bold;
      transition: 0.3s;
    }

    .social-links a:hover {
      color: #fff;
      text-shadow: 0 0 5px #ff6f61;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #555;
    }

    /* Small mobile tweak */
    @media (max-width: 500px) {
      h1 { font-size: 2rem; }
      audio { max-width: 90%; }
    }
  </style>
</head>
<body>
  <h1>🎧 Mustard Seed Radio</h1>
  <p>Streaming live 24/7 – enjoy the music!</p>

  <audio controls autoplay>
    <source src="https://centova.gr-net.gr/proxy/mustardseed/stream" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <div class="social-links">
    <a href="#" target="_blank">Facebook</a>
    <a href="#" target="_blank">Instagram</a>
    <a href="#" target="_blank">Twitter</a>
  </div>

  <footer>
    &copy; 2026 Mustard Seed Radio. All rights reserved.
  </footer>
</body>
</html>
